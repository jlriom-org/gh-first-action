name: Deploy Project
on: push  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v7
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: .
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      # - name: get code
      #   uses: actions/checkout@v7
      # - name: Install Node.js
      #   uses: actions/setup-node@v7
      #   with:
      #     node-version: '24'
      # - name: Install dependencies
      #   run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: my-artifact
          path: .      
      - name: Build project
        run: npm run build
      - name: Deploy to server
        run: |
          echo "Deploying to server..."
        
    
  
